          allOf:
          - $ref: '#/components/schemas/UserMinimal'
          readOnly: true
        viewed_at:
          type: string
          format: date-time
          readOnly: true
        duration_seconds:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        target_type:
          type: string
          readOnly: true
        target_id:
          type: integer
          readOnly: true
        statistics:
          allOf:
          - $ref: '#/components/schemas/ViewStatistics'
          readOnly: true
