openapi: 3.0.3
info:
  title: Huddle Platform API
  version: 1.0.0
  description: API for the Huddle social media app
paths:
  /api/v1/admin_pannel/actions/ban-user/:
    post:
      operationId: api_v1_admin_pannel_actions_ban_user_create
      description: Ban a user.
      tags:
      - Admin Log
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanUserInputRequest'
            examples:
              BanRequest:
                value:
                  user_id: 42
                  reason: Violation of community guidelines
                  duration_days: 7
                summary: Ban request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BanUserInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BanUserInputRequest'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanUserResponse'
              examples:
                BanResponse:
                  value:
                    user_id: 42
                    username: offender
                    previous_status: active
                    new_status: suspended
                    duration_days: 7
                    banned_at: '2025-03-07T12:34:56Z'
                    banned_by: admin
                    reason: Violation of community guidelines
                  summary: Ban response
          description: ''
  /api/v1/admin_pannel/actions/remove-content/:
    post:
      operationId: api_v1_admin_pannel_actions_remove_content_create
      description: Remove a piece of content (post or group).
      tags:
      - Admin Log
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveContentInputRequest'
            examples:
              RemoveContentRequest:
                value:
                  content_type: post
                  object_id: 123
                  reason: Inappropriate content
                summary: Remove content request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RemoveContentInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RemoveContentInputRequest'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveContentResponse'
              examples:
                RemoveContentResponse:
                  value:
                    content_type: post
                    object_id: 123
                    removed_at: '2025-03-07T12:34:56Z'
                    removed_by: admin
                    reason: Inappropriate content
                  summary: Remove content response
          description: ''
  /api/v1/admin_pannel/actions/warn-user/:
    post:
      operationId: api_v1_admin_pannel_actions_warn_user_create
      description: Warn a user.
      tags:
      - Admin Log
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarnUserInputRequest'
            examples:
              WarnRequest:
                value:
                  user_id: 42
                  reason: Spamming
                  severity: medium
                summary: Warn request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WarnUserInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WarnUserInputRequest'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarnUserResponse'
              examples:
                WarnResponse:
                  value:
                    user_id: 42
                    username: offender
                    warning_severity: medium
                    warned_at: '2025-03-07T12:34:56Z'
                    warned_by: admin
                    reason: Spamming
                    warning_count: 2
                  summary: Warn response
          description: ''
  /api/v1/admin_pannel/logs/:
    get:
      operationId: api_v1_admin_pannel_logs_retrieve
      description: List admin logs with optional filters and pagination.
      parameters:
      - in: query
        name: action
        schema:
          type: string
        description: Filter by action type
      - in: query
        name: admin_user_id
        schema:
          type: integer
        description: Filter by admin user ID
      - in: query
        name: end_date
        schema:
          type: string
        description: End date (ISO format)
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page
      - in: query
        name: start_date
        schema:
          type: string
        description: Start date (ISO format)
      - in: query
        name: target_user_id
        schema:
          type: integer
        description: Filter by target user ID
      tags:
      - Admin Log
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminLog'
          description: ''
  /api/v1/admin_pannel/logs/{log_id}/:
    get:
      operationId: api_v1_admin_pannel_logs_retrieve_2
      description: Retrieve a single admin log by its ID.
      parameters:
      - in: path
        name: log_id
        schema:
          type: integer
        required: true
      tags:
      - Admin Log
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLogDisplay'
          description: ''
  /api/v1/admin_pannel/logs/cleanup/:
    post:
      operationId: api_v1_admin_pannel_logs_cleanup_create
      description: Delete old admin logs (older than given days).
      tags:
      - Admin Log
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupLogsInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CleanupLogsInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CleanupLogsInputRequest'
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/v1/admin_pannel/logs/export/:
    get:
      operationId: api_v1_admin_pannel_logs_export_retrieve
      description: Export admin logs as JSON.
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
        description: End date (ISO format)
      - in: query
        name: format
        schema:
          type: string
        description: Export format (json)
      - in: query
        name: start_date
        schema:
          type: string
        description: Start date (ISO format)
      tags:
      - Admin Log
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportAdminLogsResponse'
              examples:
                ExportLogsResponse:
                  value:
                    exported_at: '2026-03-20T15:30:00Z'
                    total_logs: 2
                    time_range:
                      start: '2026-03-01T00:00:00Z'
                      end: '2026-03-20T00:00:00Z'
                    logs:
                    - id: 1
                      action: user_ban
                      admin_user:
                        id: 10
                        username: moderator1
                        email: mod1@example.com
                      target_user:
                        id: 42
                        username: offender
                        email: offender@example.com
                      target_id: null
                      reason: Violation of community guidelines
                      created_at: '2026-03-19T12:00:00Z'
                    - id: 2
                      action: post_remove
                      admin_user:
                        id: 11
                        username: moderator2
                        email: mod2@example.com
                      target_user: null
                      target_id: 123
                      reason: Inappropriate content
                      created_at: '2026-03-18T09:30:00Z'
                  summary: Export logs response
          description: ''
  /api/v1/admin_pannel/logs/recent/:
    get:
      operationId: api_v1_admin_pannel_logs_recent_retrieve
      description: Get recent admin actions (last N days).
      parameters:
      - in: query
        name: days
        schema:
          type: integer
        description: Number of days to look back
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page
      tags:
      - Admin Log
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminLog'
          description: ''
  /api/v1/admin_pannel/logs/search/:
    get:
      operationId: api_v1_admin_pannel_logs_search_retrieve
      description: Search admin logs by query.
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page
      - in: query
        name: query
        schema:
          type: string
        description: Search query
        required: true
      - in: query
        name: search_in
        schema:
          type: string
        description: Fields to search in (comma-separated)
      tags:
      - Admin Log
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminLog'
          description: ''
  /api/v1/admin_pannel/logs/statistics/:
    get:
      operationId: api_v1_admin_pannel_logs_statistics_retrieve
      description: Get statistics about admin actions.
      parameters:
      - in: query
        name: admin_user_id
        schema:
          type: integer
        description: Filter by admin user ID
      - in: query
        name: days
        schema:
          type: integer
        description: Number of days for statistics
      tags:
      - Admin Log
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatistics'
          description: ''
  /api/v1/admin_pannel/logs/user/{user_id}/:
    get:
      operationId: api_v1_admin_pannel_logs_user_retrieve
      description: Get admin logs related to a specific user (as admin or target).
      parameters:
      - in: query
        name: as_admin
        schema:
          type: boolean
        description: Include logs where user acted as admin
      - in: query
        name: as_target
        schema:
          type: boolean
        description: Include logs where user was target
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
      - Admin Log
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminLog'
          description: ''
  /api/v1/admin_pannel/report/:
    post:
      operationId: api_v1_admin_pannel_report_create
      description: Submit a new report for a piece of content.
      tags:
      - Report's
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportedContentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReportedContentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReportedContentCreateRequest'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportedContentDisplay'
          description: ''
  /api/v1/admin_pannel/reports/:
    get:
      operationId: api_v1_admin_pannel_reports_retrieve
      description: List reports with optional filters and pagination.
      parameters:
      - in: query
        name: content_type
        schema:
          type: string
        description: Filter by content type
      - in: query
        name: end_date
        schema:
          type: string
        description: End date (ISO format)
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page
      - in: query
        name: reporter_id
        schema:
          type: integer
        description: Filter by reporter ID
      - in: query
        name: start_date
        schema:
          type: string
        description: Start date (ISO format)
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status
      - in: query
        name: unresolved_only
        schema:
          type: boolean
        description: Show only unresolved reports
      tags:
      - Report's
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReportedContent'
          description: ''
  /api/v1/admin_pannel/reports/{report_id}/:
    get:
      operationId: api_v1_admin_pannel_reports_retrieve_2
      description: Retrieve a single report by ID.
      parameters:
      - in: path
        name: report_id
        schema:
          type: integer
        required: true
      tags:
      - Report's
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportedContentDisplay'
          description: ''
  /api/v1/admin_pannel/reports/{report_id}/dismiss/:
    post:
      operationId: api_v1_admin_pannel_reports_dismiss_create
      description: Dismiss a report without taking action.
      parameters:
      - in: path
        name: report_id
        schema:
          type: integer
        required: true
      tags:
      - Report's
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DismissReportInputRequest'
            examples:
              DismissRequest:
                value:
                  reason: Not a violation
                summary: Dismiss request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DismissReportInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DismissReportInputRequest'
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportedContentDisplay'
              examples:
                DismissResponse:
                  value:
                    id: 1
                    status: dismissed
                    resolved_at: '2025-03-07T12:34:56Z'
                    reporter: 5
                    content_type: post
                    object_id: 123
                    reason: Harassment
                    created_at: '2025-03-07T12:34:56Z'
                  summary: Dismiss response
          description: ''
  /api/v1/admin_pannel/reports/{report_id}/resolve/:
    post:
      operationId: api_v1_admin_pannel_reports_resolve_create
      description: Resolve a report by taking an action (remove content, warn user,
        ban user, or dismiss).
      parameters:
      - in: path
        name: report_id
        schema:
          type: integer
        required: true
      tags:
      - Report's
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveReportInputRequest'
            examples:
              ResolveRequest:
                value:
                  action: remove_content
                  resolution_details: Post removed
                summary: Resolve request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResolveReportInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResolveReportInputRequest'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResolveResponse'
              examples:
                ResolveResponse:
                  value:
                    report:
                      id: 1
                      status: resolved
                      resolved_at: '2025-03-07T12:34:56Z'
                      reporter: 5
                      content_type: post
                      object_id: 123
                      reason: Harassment
                      created_at: '2025-03-07T12:34:56Z'
                    action_result:
                      success: true
                      content_type: post
                      object_id: 123
                      action_taken: remove_content
                      resolved_by: admin
                      resolved_at: '2025-03-07T12:34:56Z'
                  summary: Resolve response
          description: ''
  /api/v1/admin_pannel/reports/{report_id}/update-status/:
    patch:
      operationId: api_v1_admin_pannel_reports_update_status_partial_update
      description: Update the status of a report (e.g., mark as reviewed).
      parameters:
      - in: path
        name: report_id
        schema:
          type: integer
        required: true
      tags:
      - Report's
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedReportStatusUpdateRequest'
            examples:
              UpdateStatusRequest:
                value:
                  status: reviewed
                  resolution_notes: Investigating
                summary: Update status request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedReportStatusUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedReportStatusUpdateRequest'
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportedContentDisplay'
              examples:
                UpdateStatusResponse:
                  value:
                    id: 1
                    status: reviewed
                    resolved_at: null
                    reporter: 5
                    content_type: post
                    object_id: 123
                    reason: Harassment
                    created_at: '2025-03-07T12:34:56Z'
                  summary: Update status response
          description: ''
  /api/v1/admin_pannel/reports/cleanup/:
    post:
      operationId: api_v1_admin_pannel_reports_cleanup_create
      description: Delete old resolved/dismissed reports.
      tags:
      - Report's
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CleanupReportsInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CleanupReportsInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CleanupReportsInputRequest'
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/v1/admin_pannel/reports/moderation-report/:
    get:
      operationId: api_v1_admin_pannel_reports_moderation_report_retrieve
      description: Generate a moderation report for a given period.
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
        description: End date (ISO format)
      - in: query
        name: start_date
        schema:
          type: string
        description: Start date (ISO format)
      tags:
      - Report's
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationReportResponse'
              examples:
                ModerationReportExample:
                  value:
                    period:
                      start: '2026-02-20T00:00:00Z'
                      end: '2026-03-20T00:00:00Z'
                      days: 29
                    report_statistics:
                      total_reports: 120
                      resolved_reports: 80
                      pending_reports: 40
                      resolution_rate: 66.7
                      avg_resolution_hours: 12.5
                    moderation_actions:
                      total_actions: 95
                      action_breakdown:
                      - action: remove_content
                        count: 50
                      - action: warn_user
                        count: 30
                      - action: ban_user
                        count: 15
                      top_moderators:
                      - admin_user__username: moderator1
                        count: 40
                      - admin_user__username: moderator2
                        count: 30
                    trends:
                      reports_per_day: 4.1
                      actions_per_day: 3.2
                    generated_at: '2026-03-20T15:30:00Z'
                  summary: Moderation report example
          description: ''
  /api/v1/admin_pannel/reports/pending/:
    get:
      operationId: api_v1_admin_pannel_reports_pending_retrieve
      description: List all pending reports.
      parameters:
      - in: query
        name: content_type
        schema:
          type: string
        description: Filter by content type
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page
      tags:
      - Report's
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReportedContent'
          description: ''
  /api/v1/admin_pannel/reports/search/:
    get:
      operationId: api_v1_admin_pannel_reports_search_retrieve
      description: Search reports by query (reason, reporter username).
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page
      - in: query
        name: query
        schema:
          type: string
        description: Search query
        required: true
      - in: query
        name: search_in
        schema:
          type: string
        description: Fields to search in (comma-separated)
      tags:
      - Report's
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReportedContent'
          description: ''
  /api/v1/admin_pannel/reports/statistics/:
    get:
      operationId: api_v1_admin_pannel_reports_statistics_retrieve
      description: Get statistics about reports (counts by status, type, etc.).
      parameters:
      - in: query
        name: content_type
        schema:
          type: string
        description: Filter by content type
      - in: query
        name: days
        schema:
          type: integer
        description: Number of days for statistics
      tags:
      - Report's
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportStatistics'
          description: ''
  /api/v1/admin_pannel/reports/urgent/:
    get:
      operationId: api_v1_admin_pannel_reports_urgent_list
      description: Get urgent reports (multiple reports on the same content in a short
        time).
      parameters:
      - in: query
        name: hours
        schema:
          type: integer
        description: Lookback period in hours
      - in: query
        name: threshold
        schema:
          type: integer
        description: Minimum number of reports to be considered urgent
      tags:
      - Report's
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UrgentReport'
              examples:
                UrgentReportsExample:
                  value:
                  - - content_type: post
                      object_id: 123
                      report_count: 8
                      unique_reporter_count: 5
                      first_reported: '2026-03-20T12:00:00Z'
                      last_reported: '2026-03-20T15:00:00Z'
                  summary: Urgent reports example
          description: ''
  /api/v1/admin_pannel/reports/user/{user_id}/history/:
    get:
      operationId: api_v1_admin_pannel_reports_user_history_retrieve
      description: Get report history for a specific user.
      parameters:
      - in: query
        name: as_reporter
        schema:
          type: boolean
        description: Include reports made by the user
      - in: query
        name: page
        schema:
          type: integer
        description: Page number
      - in: query
        name: page_size
        schema:
          type: integer
        description: Results per page
      - in: path
        name: user_id
        schema:
          type: integer
        required: true
      tags:
